<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="iCover — Generate stunning diagonal split preview images for your README" />
    <meta name="theme-color" content="#0064d1" />

    <!-- Open Graph -->
    <meta property="og:title" content="iCover" />
    <meta property="og:description" content="Merge light & dark screenshots into a stunning diagonal split cover image" />
    <meta property="og:type" content="website" />

    <!-- Favicon: inline SVG -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%230064d1'/%3E%3Cpolygon points='0,0 32,0 32,32' fill='%23ffffff' opacity='0.15'/%3E%3Ctext x='16' y='22' font-family='-apple-system,sans-serif' font-size='16' font-weight='700' fill='white' text-anchor='middle'%3Ei%3C/text%3E%3C/svg%3E" />

    <title>iCover</title>

    <!-- Anti-FOUC: apply dark/light class before first paint -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem("icover-theme");
          var prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
          var isDark =
            stored === "dark" || (stored !== "light" && prefersDark);
          if (isDark) {
            document.documentElement.classList.add("dark");
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
